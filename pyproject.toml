[project]
name = "unienv_interface"
version = "0.0.1a"
requires-python = ">= 3.10"
dependencies = [
    "numpy",
    "gymnasium>=0.29.0",
    "pydlpack",
    "array-api-compat",
    "packaging"
]

[project.optional-dependencies]
dev = [
    "pytest",
    "tqdm"
]
torch = [
    "torch"
]
jax = [
    "jax"
]

[tool.setuptools.packages.find]
include = ["*"]
exclude = ["training*", "tests*"]