# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Pytest Package Test

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        test_folder: ["./tests_interface", "./tests_data"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install moviepy imageio-ffmpeg
        pip3 install numpy
        pip3 install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
        pip3 install jax
        python -m pip install pytest
        python -m pip install tensordict h5py opencv-python pyarrow
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install -e .[video,dev,gymnasium]
    - name: Test with pytest
      run: |
        pytest ${{ matrix.test_folder }}
